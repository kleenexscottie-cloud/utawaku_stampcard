<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3x3 シークレット・ビンゴスタンプ</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome (for icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- html2canvas (For capturing the card as image) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500;700&display=swap');
    
    body {
      font-family: 'Kiwi Maru', 'Helvetica Neue', Arial, sans-serif;
      background-color: #fefaf0;
    }

    /* スタンプが押されるときのアニメーション */
    @keyframes stamp-animation {
      0% {
        transform: scale(3);
        opacity: 0;
      }
      80% {
        transform: scale(0.9);
        opacity: 0.9;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .stamp-active {
      animation: stamp-animation 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-between p-4 md:p-8 text-slate-800">

  <!-- ヘッダー -->
  <header class="w-full max-w-md text-center my-4">
    <h1 class="text-3xl font-bold text-amber-600 flex items-center justify-center gap-2">
      <i class="fa-solid fa-circle-question text-amber-400 animate-pulse"></i>
      シークレット・ビンゴ
      <i class="fa-solid fa-circle-question text-amber-400 animate-pulse"></i>
    </h1>
    <p class="text-xs text-slate-500 mt-1">言葉を当てて、隠された画像付きマスをオープンしよう！</p>
  </header>

  <!-- メインコンテンツ -->
  <main class="w-full max-w-md flex-grow flex flex-col items-center justify-center gap-6">
    
    <!-- 設定 & アラートエリア -->
    <div id="alertBox" class="w-full bg-amber-100 border border-amber-300 text-amber-800 px-4 py-3 rounded-xl hidden transition-all duration-300 text-center text-sm font-semibold shadow-sm">
      <!-- メッセージが動的に入ります -->
    </div>

    <!-- ビンゴカード外枠 -->
    <div id="bingo-card" class="relative w-full aspect-square bg-amber-50 border-8 border-amber-500 rounded-3xl p-4 shadow-xl flex flex-col justify-between overflow-hidden">
      
      <!-- 3x3 グリッド -->
      <div class="grid grid-cols-3 grid-rows-3 gap-3 w-full h-full z-10">
        <!-- マス目 1~9 (JSで動的にレンダリング) -->
        <div id="grid-container" class="contents"></div>
      </div>

    </div>

    <!-- コントロールパネル -->
    <div class="w-full bg-white p-5 rounded-2xl shadow-md border border-amber-100 flex flex-col gap-4">
      
      <!-- テキスト入力フォーム（スタンプを押す用） -->
      <div class="flex flex-col gap-2">
        <label for="searchWord" class="text-sm font-bold text-amber-700 flex items-center gap-1">
          <i class="fa-solid fa-key"></i> 隠された言葉を入力：
        </label>
        <div class="flex gap-2">
          <input type="text" id="searchWord" placeholder="例: りんご" 
                 class="flex-grow px-4 py-3 rounded-xl border-2 border-amber-200 focus:border-amber-500 focus:outline-none transition text-base" />
          <button id="btnStamp" class="bg-amber-500 hover:bg-amber-600 active:scale-95 text-white font-bold px-5 py-3 rounded-xl shadow-md transition flex items-center gap-1 shrink-0">
            <span>回答する!</span>
          </button>
        </div>
      </div>

      <!-- 画像として保存 & 各種設定 -->
      <div class="flex flex-col gap-3 border-t border-slate-100 pt-3">
        
        <!-- 画像保存ボタン -->
        <button id="btnSaveImage" class="w-full bg-emerald-500 hover:bg-emerald-600 active:scale-95 text-white font-bold py-3 px-4 rounded-xl shadow-md transition flex items-center justify-center gap-2">
          <i class="fa-solid fa-camera"></i>
          <span>カードを画像として保存</span>
        </button>

        <div class="flex gap-2 justify-between items-center mt-1">
          <button id="btnEdit" class="text-sm font-semibold text-slate-500 hover:text-amber-600 flex items-center gap-1 transition px-3 py-2 rounded-lg hover:bg-amber-50">
            <i class="fa-solid fa-pen-to-square"></i> <span id="editText">カードを編集する</span>
          </button>
          <button id="btnReset" class="text-sm font-semibold text-rose-500 hover:text-rose-700 flex items-center gap-1 transition px-3 py-2 rounded-lg hover:bg-rose-50">
            <i class="fa-solid fa-rotate-right"></i> 全リセット
          </button>
        </div>
      </div>

    </div>

    <!-- ビンゴお祝いモーダル -->
    <div id="bingoModal" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 hidden">
      <div class="bg-white rounded-3xl p-6 text-center max-w-sm w-full shadow-2xl border-4 border-amber-400 animate-bounce-short">
        <div class="text-5xl my-2">🎉</div>
        <h2 class="text-3xl font-extrabold text-amber-600 mb-2">BINGO!!</h2>
        <p class="text-slate-600 font-semibold mb-4">すべてのワードをクリアして、ビンゴが完成しました！</p>
        <button id="btnCloseModal" class="w-full py-3 bg-amber-500 hover:bg-amber-600 text-white font-bold rounded-xl shadow-lg transition">
          閉じる
        </button>
      </div>
    </div>

  </main>

  <!-- フッター -->
  <footer class="w-full text-center text-xs text-slate-400 my-4">
    3x3 Bingo Stamp App &copy; 2026
  </footer>

  <!-- アプリスクリプト -->
  <script>
    // 初期データ (食べ物テーマ + 高画質画像)
    const defaultWords = [
      { word: "りんご", imageUrl: "https://kleenexscottie-cloud.github.io/utawaku_stampcard/image/ringo.png" },
      { word: "バナナ", imageUrl: "https://kleenexscottie-cloud.github.io/utawaku_stampcard/image/banana.png" },
      { word: "みかん", imageUrl: "https://kleenexscottie-cloud.github.io/utawaku_stampcard/image/mikan.png" },
      { word: "ぶどう", imageUrl: "https://kleenexscottie-cloud.github.io/utawaku_stampcard/image/budou.png" },
      { word: "メロン", imageUrl: "https://kleenexscottie-cloud.github.io/utawaku_stampcard/image/meron.png" },
      { word: "いちご", imageUrl: "https://kleenexscottie-cloud.github.io/utawaku_stampcard/image/itigo.png" },
      { word: "すいか", imageUrl: "https://kleenexscottie-cloud.github.io/utawaku_stampcard/image/suika.png" },
      { word: "キウイ", imageUrl: "https://kleenexscottie-cloud.github.io/utawaku_stampcard/image/kiui.png" },
      { word: "れもん", imageUrl: "https://kleenexscottie-cloud.github.io/utawaku_stampcard/image/remon.png" }
    ];

    // 状態管理
    let bingoData = []; // { id, word, imageUrl, stamped }
    let isEditing = false;

    // DOM要素
    const gridContainer = document.getElementById('grid-container');
    const bingoCard = document.getElementById('bingo-card');
    const searchWordInput = document.getElementById('searchWord');
    const btnStamp = document.getElementById('btnStamp');
    const btnSaveImage = document.getElementById('btnSaveImage');
    const btnEdit = document.getElementById('btnEdit');
    const btnReset = document.getElementById('btnReset');
    const editText = document.getElementById('editText');
    const alertBox = document.getElementById('alertBox');
    const bingoModal = document.getElementById('bingoModal');
    const btnCloseModal = document.getElementById('btnCloseModal');

    // 1. 初期化
    function init() {
      // データのロード (なければデフォルト)
      //const saved = localStorage.getItem('bingo_3x3_data_v2');
      const saved = sessionStorage.getItem('bingo_3x3_data_v2');
      if (saved) {
        try {
          bingoData = JSON.parse(saved);
        } catch(e) {
          resetData();
        }
      } else {
        resetData();
      }

      renderGrid();
      checkBingo(false); // 初期化時は演出なしでビンゴ状態確認
    }

    // データリセット
    function resetData() {
      // ローカルストレージからキーごと完全に削除する
      //localStorage.removeItem('bingo_3x3_data_v2');

      bingoData = defaultWords.map((item, index) => ({
        id: index,
        word: item.word,
        imageUrl: item.imageUrl,
        stamped: false
      }));
      saveData();
    }

    // データ保存
    function saveData() {
      //localStorage.setItem('bingo_3x3_data_v2', JSON.stringify(bingoData));
      sessionStorage.setItem('bingo_3x3_data_v2', JSON.stringify(bingoData));
    }

    // 2. グリッドの描画
    function renderGrid() {
      gridContainer.innerHTML = '';
      
      bingoData.forEach((cell, idx) => {
        const cellEl = document.createElement('div');
        // セルの基本スタイル
        cellEl.className = `relative flex flex-col items-center justify-between p-2 rounded-2xl border-2 transition-all duration-300 text-center overflow-hidden h-full aspect-square shadow-sm select-none cursor-default
          ${cell.stamped 
            ? 'bg-amber-100 border-amber-400' 
            : 'bg-stone-100 border-stone-200'}`;

        if (isEditing) {
          // 編集モード：言葉の設定と画像アップロード用UI
          cellEl.className += ' bg-amber-50/50 border-dashed border-amber-300 p-1.5 justify-around';
          
          // 言葉入力
          const input = document.createElement('input');
          input.type = 'text';
          input.value = cell.word;
          input.placeholder = '言葉を入力';
          input.className = 'w-full text-center bg-white rounded border border-amber-300 focus:outline-none font-bold text-xs text-amber-900 p-1';
          input.addEventListener('change', (e) => {
            bingoData[idx].word = e.target.value.trim();
            saveData();
          });
          cellEl.appendChild(input);

          // 画像のプレビューまたはアップロードボタン
          const imageControl = document.createElement('div');
          imageControl.className = 'w-full flex flex-col items-center gap-1';

          const fileInput = document.createElement('input');
          fileInput.type = 'file';
          fileInput.accept = 'image/*';
          fileInput.id = `file-${idx}`;
          fileInput.className = 'hidden';
          
          // ファイルが選ばれたときの圧縮・Base64変換
          fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
              resizeAndProcessImage(file, (base64Str) => {
                bingoData[idx].imageUrl = base64Str;
                saveData();
                renderGrid(); // 再描画してプレビューを反映
              });
            }
          });

          const uploadBtn = document.createElement('label');
          uploadBtn.htmlFor = `file-${idx}`;
          uploadBtn.className = 'cursor-pointer text-[10px] bg-amber-500 hover:bg-amber-600 active:scale-95 text-white font-bold px-2 py-1 rounded shadow-sm transition flex items-center gap-1';
          
          if (cell.imageUrl) {
            uploadBtn.innerHTML = `<i class="fa-solid fa-image"></i> 変更`;
          } else {
            uploadBtn.innerHTML = `<i class="fa-solid fa-plus"></i> 画像追加`;
          }

          imageControl.appendChild(fileInput);
          imageControl.appendChild(uploadBtn);

          // プレビュー表示（ある場合のみ）
          if (cell.imageUrl) {
            const previewImg = document.createElement('img');
            previewImg.src = cell.imageUrl;
            previewImg.className = 'w-8 h-8 object-cover rounded-md border border-amber-300 shadow-sm';
            imageControl.appendChild(previewImg);
          }

          cellEl.appendChild(imageControl);

        } else {
          // 通常プレイモード
          const textEl = document.createElement('span');
          
          if (cell.stamped) {
            // スタンプ（画像）が公開された状態：
            // ワード名を下部に少し重ねる、または表示するため、文字サイズを小さく調整
            textEl.className = 'font-bold text-xs md:text-sm text-amber-900 bg-amber-200/90 py-0.5 px-2 rounded-full absolute bottom-1.5 z-20 shadow-sm break-all max-w-[90%]';
            textEl.textContent = cell.word || '(空欄)';
          } else {
            // 未オープンの状態：中央に大きく「？」
            textEl.className = 'font-black text-2xl md:text-3xl text-stone-400/80 tracking-widest my-auto';
            textEl.innerHTML = `<i class="fa-solid fa-question"></i>`;
          }
          cellEl.appendChild(textEl);

          // マス専用画像 (オープン時のみポンとアニメーション付きで表示)
          if (cell.stamped) {
            const stamp = document.createElement('div');
            stamp.className = 'absolute inset-0 flex items-center justify-center pointer-events-none stamp-active p-1.5 z-10';
            
            const imgEl = document.createElement('img');
            imgEl.src = cell.imageUrl || '';
            imgEl.className = 'w-full h-full object-cover rounded-xl border-4 border-amber-400 shadow-md bg-white';
            
            // 画像読み込みエラー時のフォールバック (かわいいスタンプマーク)
            imgEl.onerror = () => {
              imgEl.src = `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23f43f5e" rx="15"/><text x="50" y="55" font-size="20" fill="white" font-weight="bold" text-anchor="middle">CLEAR!</text></svg>`;
            };

            stamp.appendChild(imgEl);
            cellEl.appendChild(stamp);
          }
        }

        gridContainer.appendChild(cellEl);
      });
    }

    // 画像ファイルを200x200pxに圧縮し、容量を小さくしてBase64で出力するヘルパー
    function resizeAndProcessImage(file, callback) {
      const reader = new FileReader();
      reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const max_size = 200; // 200x200pxにリサイズ
          let width = img.width;
          let height = img.height;

          if (width > height) {
            if (width > max_size) {
              height *= max_size / width;
              width = max_size;
            }
          } else {
            if (height > max_size) {
              width *= max_size / height;
              height = max_size;
            }
          }
          
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('200px');
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          
          const dataUrl = canvas.toDataURL('image/jpeg', 0.85); // 画質85%で圧縮
          callback(dataUrl);
        }
        img.src = event.target.result;
      }
      reader.readAsDataURL(file);
    }

    // 3. メッセージ表示
    function showAlert(message, duration = 3000) {
      alertBox.textContent = message;
      alertBox.classList.remove('hidden');
      setTimeout(() => {
        alertBox.classList.add('hidden');
      }, duration);
    }

    // 4. ワード検索によるスタンプ処理
    function applyStampByWord() {
      if (isEditing) {
        showAlert('⚠️ 編集モードを終了してから回答を入力してください。');
        return;
      }

      const inputWord = searchWordInput.value.trim();
      if (!inputWord) {
        showAlert('⚠️ 言葉を入力してください。');
        return;
      }

      // 一致するマスを探す
      const targetIndices = [];
      bingoData.forEach((cell, idx) => {
        if (!cell.stamped && cell.word && cell.word.toLowerCase() === inputWord.toLowerCase()) {
          targetIndices.push(idx);
        }
      });

      if (targetIndices.length > 0) {
        targetIndices.forEach(idx => {
          bingoData[idx].stamped = true;
        });
        saveData();
        renderGrid();
        showAlert(`🎉 正解！「${inputWord}」がオープンされました！`);
        searchWordInput.value = '';
        checkBingo(true); // ビンゴ判定（演出あり）
      } else {
        const alreadyStamped = bingoData.some(cell => cell.word && cell.word.toLowerCase() === inputWord.toLowerCase() && cell.stamped);
        if (alreadyStamped) {
          showAlert(`💡 「${inputWord}」はすでにオープンされています。`);
        } else {
          showAlert(`❌ 「${inputWord}」はカードに隠されていません。別な言葉を試そう！`);
        }
      }
    }

    // 5. ビンゴ判定
    const lines = [
      [0, 1, 2], // 横1
      [3, 4, 5], // 横2
      [6, 7, 8], // 横3
      [0, 3, 6], // 縦1
      [1, 4, 7], // 縦2
      [2, 5, 8], // 縦3
      [0, 4, 8], // 斜め(左上-右下)
      [2, 4, 6]  // 斜め(右上-左下)
    ];

    function checkBingo(triggerCelebration) {
      let activeLines = [];

      lines.forEach((line, index) => {
        const isCompleted = line.every(idx => bingoData[idx].stamped);
        if (isCompleted) {
          activeLines.push(index);
        }
      });

      // 新しくビンゴが発生した時だけモーダルを出す
      if (triggerCelebration && activeLines.length > 0) {
        const lastBingoCount = parseInt(sessionStorage.getItem('last_bingo_count') || '0');
        if (activeLines.length > lastBingoCount) {
          setTimeout(() => {
            bingoModal.classList.remove('hidden');
          }, 600);
        }
      }
      sessionStorage.setItem('last_bingo_count', activeLines.length.toString());
    }

    // 6. カードを画像として保存
    function saveCardAsImage() {
      if (isEditing) {
        showAlert('⚠️ 編集モードを終了してから保存してください。');
        return;
      }

      showAlert('📸 画像を生成中...');

      // html2canvasでビンゴカード部分をレンダリングしてダウンロード
      html2canvas(bingoCard, {
        scale: 3, // 高画質エクスポート
        backgroundColor: '#fdf6e2', // カードの元の背景色
        useCORS: true,
        logging: false
      }).then(canvas => {
        try {
          const link = document.createElement('a');
          link.download = 'secret-bingo-card.png';
          link.href = canvas.toDataURL('image/png');
          link.click();
          showAlert('🎉 画像のダウンロードを開始しました！');
        } catch (err) {
          console.error(err);
          showAlert('❌ 画像の保存に失敗しました。');
        }
      }).catch(err => {
        console.error(err);
        showAlert('❌ 画像の生成中にエラーが発生しました。');
      });
    }

    // 7. イベントリスナー
    btnStamp.addEventListener('click', applyStampByWord);
    searchWordInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        applyStampByWord();
      }
    });

    // 画像として保存
    btnSaveImage.addEventListener('click', saveCardAsImage);

    // 編集モード切り替え
    btnEdit.addEventListener('click', () => {
      isEditing = !isEditing;
      if (isEditing) {
        editText.textContent = '編集を保存して隠す';
        btnEdit.classList.remove('text-slate-500', 'hover:text-amber-600');
        btnEdit.classList.add('text-emerald-600', 'hover:text-emerald-700', 'bg-emerald-50');
        showAlert('📝 隠されたマスの答えと画像を変更・確認できます！');
      } else {
        editText.textContent = 'カードを編集する';
        btnEdit.classList.remove('text-emerald-600', 'hover:text-emerald-700', 'bg-emerald-50');
        btnEdit.classList.add('text-slate-500', 'hover:text-amber-600');
        showAlert('💾 答えの編集内容を保存し、再び隠しました。');
      }
      renderGrid();
      checkBingo(false);
    });

    // 全リセット
    btnReset.addEventListener('click', () => {
      if (confirm('ビンゴカードの状態と、マスの中身を初期化します。よろしいですか？')) {
        resetData();
        isEditing = false;
        editText.textContent = 'カードを編集する';
        btnEdit.className = 'text-sm font-semibold text-slate-500 hover:text-amber-600 flex items-center gap-1 transition px-3 py-2 rounded-lg hover:bg-amber-50';
        searchWordInput.value = '';
        sessionStorage.setItem('last_bingo_count', '0');
        renderGrid();
        checkBingo(false);
        showAlert('🔄 カードを初期状態（隠された状態）にリセットしました。');
      }
    });

    // モーダルを閉じる
    btnCloseModal.addEventListener('click', () => {
      bingoModal.classList.add('hidden');
    });

    // アプリスタート
    init();
  </script>
</body>
</html>
